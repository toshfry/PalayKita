<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Login | PalayKita</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{{ url_for('static', filename='icons/palaykita_logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">

    <style>
        /* Login page polish */
        body.login-body {
            background: #ffffff !important;
        }

        .login-card {
            max-width: 430px;
            padding: 34px;
        }

        .login-brand-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .login-brand-header .login-logo {
            flex: 0 0 74px;
            width: 74px;
            height: 74px;
            margin: 0;
            padding: 0;
            display: block;
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            overflow: visible;
        }

        .login-brand-header .login-logo img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .login-brand-text h1 {
            margin: 0 0 4px;
            line-height: 1;
            letter-spacing: 0;
            font-size: 34px;
            font-weight: 900;
        }

        .login-wordmark {
            display: flex;
            align-items: baseline;
            gap: 0;
        }

        .word-palay {
            color: #D69C0B;
        }

        .word-kita {
            color: #056C27;
        }

        .login-brand-text p {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
        }

        .login-card form {
            margin-top: 0;
        }

        .login-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px;
            }

            .login-brand-header {
                gap: 13px;
                margin-bottom: 22px;
            }

            .login-brand-header .login-logo {
                flex-basis: 62px;
                width: 62px;
                height: 62px;
            }
        }
    </style>
</head>

<body class="login-body">
    <div class="login-card">
        <div class="login-brand-header">
            <div class="login-logo">
                <img src="{{ url_for('static', filename='icons/palaykita_logo.png') }}" alt="PalayKita logo">
            </div>
            <div class="login-brand-text">
                <h1 class="login-wordmark"><span class="word-palay">Palay</span><span class="word-kita">Kita</span></h1>
                <p>Rice Milling Profit Tracker</p>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="post">
            <label>Username</label>
            <input type="text" name="username" required autofocus>

            <label>Password</label>
            <input type="password" name="password" required>

            <button class="btn btn-primary full" type="submit">Login</button>
        </form>

        <div class="login-footer">PalayKita v{{ app_version }} &middot; Local Rice Mill System.</div>
    </div>
</body>

</html>
